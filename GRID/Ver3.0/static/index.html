<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>로또번호 랜덤 생성</title>
<link rel="icon" type="image/png" href="/favicon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;
  font-family:"Malgun Gothic","Apple SD Gothic Neo","나눔고딕","Nanum Gothic",sans-serif;
  background:#e52748;
  color:#222;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}

/* ── 배경 워터마크 ── */
.bg-wrap{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-num{
  position:absolute;font-weight:900;
  font-size:clamp(60px,9vw,130px);
  color:rgba(255,255,255,.055);
  line-height:1;user-select:none;
}

/* ── 페이지 래퍼 ── */
.page-wrap{
  position:relative;z-index:1;
  min-height:100vh;
  padding:24px 24px 64px;
  display:flex;flex-direction:column;
  align-items:center;gap:18px;
}

/* ── 버튼 카드 ── */
.btn-card{
  width:100%;max-width:1200px;
  background:#fff;
  border-radius:16px;
  box-shadow:0 3px 18px rgba(0,0,0,.12);
  padding:16px 20px;
}
.btn-row{display:flex;align-items:flex-end;gap:10px}
.draw-select-wrap{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.draw-select-lbl{font-size:11px;color:#888;font-weight:600;text-align:center;letter-spacing:.3px}
.draw-sel{
  height:58px;width:172px;padding:0 12px;
  border:1.5px solid #e8e8e8;border-radius:10px;
  font-size:15px;font-weight:700;color:#333;
  background:#fafafa;cursor:pointer;
  font-family:inherit;
  text-align:right;
  text-align-last:right;
}
.draw-sel:focus{outline:none;border-color:#e52748;background:#fff}
#btn-predict{
  flex:1;min-width:0;
  height:58px;padding:0 10px;
  background:#e52748;color:#fff;
  border:none;border-radius:10px;
  font-size:18px;font-weight:700;
  cursor:pointer;letter-spacing:-.2px;
  font-family:inherit;
  transition:opacity .15s,transform .08s;
}
#btn-predict:hover{opacity:.88}
#btn-predict:active{transform:scale(.99);opacity:.8}
#btn-predict:disabled{opacity:.55;cursor:not-allowed}

/* ── 카드 컨테이너 ── */
.cards-wrap{
  width:100%;max-width:1200px;
  display:flex;gap:20px;align-items:stretch;
}

/* ── 공통 카드 ── */
.card{
  background:#fff;
  border-radius:20px;
  box-shadow:0 4px 24px rgba(0,0,0,.14);
  padding:36px 36px 44px;
  flex:1;min-width:0;
  display:flex;flex-direction:column;
}
/* 우측 카드: 내용 수직 중앙 정렬 */
.card-result{
  justify-content:center;
}

/* ── 좌측 카드 ── */
.price-tag{
  text-align:right;
  font-size:13px;
  color:#999;
  margin-bottom:14px;
  font-weight:400;
}

.logo-wrap{
  text-align:center;
  padding-bottom:20px;
  margin-bottom:20px;
  border-bottom:1px solid #f0f0f0;
}
.logo-wrap img{
  height:56px;
  max-width:240px;
  object-fit:contain;
}
.logo-fallback{
  font-size:24px;font-weight:800;
  color:#e52748;letter-spacing:-1px;
}

.draw-no-wrap{text-align:center;margin-bottom:6px}
.draw-no-text{
  font-size:46px;font-weight:800;
  color:#111;letter-spacing:-.5px;
}

.draw-schedule-wrap{text-align:center;margin-bottom:20px}
.draw-schedule-text{
  font-size:15px;font-weight:500;
  color:#e52748;
}

.cd-header{
  text-align:center;
  font-size:14px;color:#999;
  margin-bottom:12px;
}

.countdown-row{
  display:flex;justify-content:center;
  align-items:flex-start;gap:0;
}
.cd-unit{
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 16px;
}
.cd-val{
  font-size:54px;font-weight:800;
  color:#e52748;line-height:1;
  letter-spacing:-.5px;
  min-width:54px;text-align:center;
}
.cd-lbl{
  font-size:13px;color:#999;
  margin-top:10px;
}

/* ── 우측 카드 ── */
.result-header-label{
  text-align:center;font-size:14px;
  color:#999;margin-bottom:8px;
  letter-spacing:.2px;
}
.result-round-text{
  text-align:center;
  font-size:46px;font-weight:800;
  color:#111;letter-spacing:-.5px;
  margin-bottom:6px;
}
.result-date-text{
  text-align:center;
  font-size:15px;color:#999;
  margin-bottom:28px;
}

.balls-row{
  display:flex;align-items:center;
  justify-content:center;
  gap:8px;flex-wrap:nowrap;
  margin-bottom:14px;
}
.ball{
  /* 데스크탑 2열 레이아웃에서 카드 너비에 맞게 자동 축소
     (50vw - 190px) / 7 = (뷰포트 절반 - 패딩/갭/플러스기호) ÷ 볼7개
     ※ 태블릿·모바일 미디어쿼리에서 고정 크기로 덮어씀 */
  width: min(62px, calc((50vw - 190px) / 7));
  height: min(62px, calc((50vw - 190px) / 7));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size: min(20px, calc((50vw - 190px) / 7 * 0.35));
  font-weight:800;color:#fff;
  box-shadow:0 3px 10px rgba(0,0,0,.20);
  flex-shrink:0;
  text-shadow:0 1px 3px rgba(0,0,0,.22);
}
.plus-sign{
  font-size: min(26px, calc((50vw - 190px) / 7 * 0.48));
  color:#ddd;
  font-weight:300;margin:0 2px;flex-shrink:0;
}

.b1{background:radial-gradient(circle at 38% 35%,#ffe566 0%,#FBC400 100%)}
.b2{background:radial-gradient(circle at 38% 35%,#a6e8fa 0%,#69C8F2 100%)}
.b3{background:radial-gradient(circle at 38% 35%,#ffa0a0 0%,#FF6969 100%)}
.b4{background:radial-gradient(circle at 38% 35%,#d8d8d8 0%,#AAAAAA 100%)}
.b5{background:radial-gradient(circle at 38% 35%,#d5ed74 0%,#B0D840 100%)}
.b-bonus{background:radial-gradient(circle at 38% 35%,#c0c0c0 0%,#888888 100%)}

/* 당첨번호 / 보너스번호 라벨 */
.ball-label-row{
  display:flex;align-items:center;
  width:100%;gap:6px;
}
.label-section{
  display:flex;align-items:center;gap:0;
}
.label-section.win-section{flex:6}
.label-section.bonus-section{flex:1}
.label-line{flex:1;height:1px;background:#e6e6e6}
.label-txt{
  font-size:12px;color:#999;
  white-space:nowrap;padding:0 8px;
  flex-shrink:0;
}

/* ── 로딩 ── */
#loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.52);z-index:500;
  align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
}
#loading-overlay.show{display:flex}
.spinner{
  width:44px;height:44px;
  border:4px solid rgba(255,255,255,.28);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:13px;font-weight:600;font-family:inherit}

/* ── 결과 팝업 ── */
#result-popup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.58);z-index:400;
  align-items:center;justify-content:center;
  padding:16px;
}
#result-popup.show{display:flex}
.popup-card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,.28);
  padding:22px 20px;
  width:100%;max-width:640px;
  max-height:90vh;overflow-y:auto;
}
.popup-head{
  display:flex;align-items:center;
  justify-content:space-between;
  padding-bottom:12px;
  border-bottom:1px solid #f0f0f0;
  margin-bottom:10px;
}
.popup-title{font-size:16px;font-weight:800;color:#111}
.popup-close-btn{
  background:#f5f5f5;border:none;border-radius:50%;
  width:30px;height:30px;font-size:16px;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:#888;
  font-family:inherit;
}
.popup-close-btn:hover{background:#ebebeb}
.popup-info{
  font-size:12px;color:#999;
  text-align:center;
  margin-bottom:14px;
}

/* 조합 테이블 */
.combo-tbl{width:100%;border-collapse:collapse}
.combo-tbl th{
  font-size:12px;color:#999;font-weight:600;
  padding:6px 2px;text-align:center;
  border-bottom:1px solid #efefef;
}
.combo-tbl td{
  padding:10px 2px;
  text-align:center;
  border-bottom:1px solid #f7f7f7;
  vertical-align:middle;
}
.combo-tbl tr:last-child td{border-bottom:none}
.td-rank{
  font-size:16px;font-weight:700;
  color:#e52748;width:28px;
}
.td-balls{
  display:flex;align-items:center;
  justify-content:center;gap:6px;
  flex-wrap:nowrap;
}
.ball-xs{width:72px;height:72px;font-size:22px}
.td-score{font-size:17px;font-weight:700;color:#333;width:70px}

.popup-note{
  font-size:11px;color:#aaa;
  text-align:center;margin-top:14px;
}

/* ── 반응형 ─────────────────────────────────────────────────
   Desktop  >= 900px  : 두 카드 나란히, 대형 사이즈 (기본값)
   Tablet   600-899px : 두 카드 위아래 쌓임 (stacked)
   Mobile   < 600px   : 카드 위아래 쌓임, JS로 동일 높이
──────────────────────────────────────────────────────────── */

/* 태블릿 (600-899px): 위아래 쌓임 */
@media(max-width:899px){
  .page-wrap{padding:16px 16px 48px;gap:14px}
  .btn-card{padding:12px 16px;border-radius:12px;max-width:680px}
  .draw-sel{height:50px;width:148px;font-size:14px}
  #btn-predict{font-size:16px;height:50px;padding:0 10px}
  .cards-wrap{flex-direction:column;gap:14px;max-width:680px;align-items:stretch}
  .card{padding:28px 28px 34px;border-radius:18px}
  .logo-wrap{margin-bottom:16px;padding-bottom:16px}
  .logo-wrap img{height:46px;max-width:200px}
  .draw-no-text,.result-round-text{font-size:38px}
  .draw-schedule-text,.result-date-text{font-size:14px}
  .cd-header,.result-header-label{font-size:13px}
  .cd-val{font-size:44px;min-width:44px}
  .cd-unit{padding:0 14px}
  .cd-lbl{font-size:12px;margin-top:8px}
  .ball{width:58px;height:58px;font-size:19px}
  .balls-row{gap:7px;margin-bottom:12px}
  .plus-sign{font-size:22px}
  .label-txt{font-size:11px}
  .price-tag{font-size:12px}
  .result-date-text{margin-bottom:20px}
  .draw-schedule-wrap{margin-bottom:16px}
  /* 팝업 */
  .ball-xs{width:58px;height:58px;font-size:19px}
  .popup-card{max-width:520px;padding:20px 18px}
  .td-balls{gap:6px}
  .td-rank{font-size:16px}
  .td-score{font-size:15px;width:62px}
}

/* 모바일 (< 600px): 위아래 쌓임, JS로 동일 높이 */
@media(max-width:599px){
  .page-wrap{padding:10px 10px 36px;gap:10px}
  .btn-card{padding:10px 12px;border-radius:12px;max-width:100%}
  .btn-row{flex-wrap:wrap;gap:8px}
  .draw-select-wrap{flex:1;min-width:calc(50% - 4px)}
  .draw-sel{width:100%;height:44px;font-size:14px}
  #btn-predict{font-size:15px;height:46px;padding:0;flex:none;width:100%}
  .cards-wrap{flex-direction:column;gap:10px;max-width:100%;align-items:stretch}
  .card{padding:22px 20px 26px;border-radius:16px}
  .logo-wrap{margin-bottom:14px;padding-bottom:14px}
  .logo-wrap img{height:38px;max-width:180px}
  .draw-no-text,.result-round-text{font-size:30px}
  .draw-schedule-text,.result-date-text{font-size:13px}
  .cd-header,.result-header-label{font-size:12px}
  .cd-val{font-size:36px;min-width:36px}
  .cd-unit{padding:0 10px}
  .cd-lbl{font-size:11px;margin-top:7px}
  .ball{width:44px;height:44px;font-size:14px}
  .balls-row{gap:6px;margin-bottom:10px}
  .plus-sign{font-size:18px}
  .label-txt{font-size:10px}
  .price-tag{font-size:11px}
  .result-date-text{margin-bottom:16px}
  .draw-schedule-wrap{margin-bottom:14px}
  /* 팝업 */
  .ball-xs{width:36px;height:36px;font-size:11px;flex-shrink:0}
  .popup-card{max-width:100%;padding:18px 10px}
  .td-balls{gap:2px}
  .td-rank{font-size:13px;width:18px}
  .td-score{font-size:13px;width:44px}
  .combo-tbl td{padding:8px 1px}
}

/* 초소형 (< 380px) */
@media(max-width:380px){
  .cd-val{font-size:30px;min-width:30px}
  .cd-unit{padding:0 6px}
  .ball{width:36px;height:36px;font-size:11px}
  .balls-row{gap:4px}
  .draw-no-text,.result-round-text{font-size:26px}
  .ball-xs{width:36px;height:36px;font-size:11px}
}

/* ── 동기화 상태 바 ── */
.sync-bar{
  width:100%;max-width:1200px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  background:rgba(255,255,255,.16);
  border-radius:10px;
  padding:8px 16px;
  font-size:12px;color:rgba(255,255,255,.9);
}
.sync-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.sync-dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;flex-shrink:0;
}
.sync-dot.idle{background:rgba(255,255,255,.4)}
.sync-dot.syncing{background:#FFD700;animation:pulse .9s ease infinite}
.sync-dot.done{background:#4cde80}
.sync-dot.error{background:#ff6b6b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-btn{
  background:rgba(255,255,255,.2);border:none;border-radius:6px;
  padding:5px 10px;font-size:11px;font-weight:600;color:#fff;
  cursor:pointer;white-space:nowrap;font-family:inherit;
  flex-shrink:0;transition:background .15s;
}
.sync-btn:hover{background:rgba(255,255,255,.32)}
.sync-btn:disabled{opacity:.45;cursor:not-allowed}
@media(max-width:599px){
  .sync-bar{padding:7px 12px;font-size:11px}
  .sync-btn{padding:4px 8px;font-size:10px}
}

/* ── 햄버거 버튼 ── */
.hamburger-btn{
  position:fixed;top:16px;right:16px;z-index:300;
  width:46px;height:46px;
  border:none;border-radius:50%;
  background:rgba(255,255,255,.95);
  box-shadow:0 2px 14px rgba(0,0,0,.22);
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  padding:0;
  transition:background .15s,transform .1s;
}
.hamburger-btn:hover{background:#fff;transform:scale(1.07)}
.hamburger-btn span{
  display:block;width:20px;height:2.5px;
  background:#e52748;border-radius:2px;
}
.hamburger-badge{
  position:absolute;top:5px;right:5px;
  background:#e52748;color:#fff;
  font-size:9px;font-weight:800;
  border-radius:50%;width:16px;height:16px;
  display:none;align-items:center;justify-content:center;
  line-height:1;font-family:inherit;
  border:1.5px solid #fff;
}
.hamburger-badge.show{display:flex}

/* ── 이력 오버레이 / 드로어 ── */
.history-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.42);z-index:340;
}
.history-overlay.open{display:block}

.history-drawer{
  position:fixed;top:0;right:-420px;
  width:420px;max-width:100vw;height:100vh;
  background:#fff;z-index:350;
  transition:right .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  box-shadow:-4px 0 28px rgba(0,0,0,.18);
}
.history-drawer.open{right:0}

.history-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 18px 14px;
  border-bottom:1px solid #f0f0f0;
  flex-shrink:0;
}
.history-title{font-size:16px;font-weight:800;color:#111}
.history-head-right{display:flex;align-items:center;gap:8px}
.history-clear-btn{
  font-size:11px;color:#bbb;
  background:#f5f5f5;border:none;border-radius:6px;
  padding:5px 10px;cursor:pointer;white-space:nowrap;
  font-family:inherit;transition:color .15s,background .15s;
}
.history-clear-btn:hover{color:#e52748;background:#fee}
.history-close-btn{
  background:#f5f5f5;border:none;border-radius:50%;
  width:32px;height:32px;font-size:15px;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:#888;font-family:inherit;
}
.history-close-btn:hover{background:#ebebeb}

.history-body{
  flex:1;overflow-y:auto;padding:14px 16px 28px;
}
.history-empty{
  text-align:center;color:#ccc;
  font-size:13px;margin-top:48px;line-height:1.8;
}
.history-empty span{font-size:28px;display:block;margin-bottom:6px}

/* 그룹 */
.history-group{margin-bottom:22px}
.history-group-header{
  display:flex;align-items:center;
  justify-content:space-between;margin-bottom:8px;
}
.history-group-title{
  font-size:13px;font-weight:800;color:#e52748;
}
.history-group-meta-wrap{display:flex;align-items:center;gap:8px}
.history-group-meta{font-size:11px;color:#ccc}
.history-group-del{
  background:none;border:none;color:#ddd;
  cursor:pointer;font-size:13px;padding:2px 4px;
  line-height:1;font-family:inherit;
  transition:color .12s;
}
.history-group-del:hover{color:#e52748}

/* 아이템 */
.history-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;border-radius:10px;
  background:#fafafa;margin-bottom:5px;
}
.history-rank{
  font-size:12px;font-weight:700;
  color:#e52748;width:16px;flex-shrink:0;text-align:center;
}
.history-balls{display:flex;gap:3px;flex:1;flex-wrap:nowrap}
.ball-sm{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.2);
  flex-shrink:0;
}
.ball-sm.dim{opacity:.28}
.history-score{
  font-size:11px;color:#ccc;
  flex-shrink:0;width:38px;text-align:right;
}
/* 매칭 배지 */
.match-badge{
  font-size:10px;font-weight:700;
  padding:3px 7px;border-radius:6px;
  white-space:nowrap;flex-shrink:0;
  letter-spacing:-.2px;
}
.mb-pending{background:#f5f5f5;color:#bbb}
.mb-0,.mb-1,.mb-2{background:#f5f5f5;color:#bbb}
.mb-3{background:#e8f8ee;color:#2dbc6a}   /* 5등 */
.mb-4{background:#fff4e5;color:#e99722}   /* 4등 */
.mb-5{background:#fff0f2;color:#e52748}   /* 3등 */
.mb-2nd{background:#ffeef0;color:#e52748} /* 2등 */
.mb-1st{background:#fffbe0;color:#c49000;font-size:11px} /* 1등 */

@media(max-width:599px){
  .history-drawer{width:100vw}
  .hamburger-btn{top:12px;right:12px;width:42px;height:42px}
}
</style>
</head>
<body>

<!-- 배경 워터마크 -->
<div class="bg-wrap" id="bg-nums"></div>

<!-- 햄버거 버튼 -->
<button class="hamburger-btn" id="hamburger-btn" onclick="openHistory()" title="내 번호 이력">
  <span></span><span></span><span></span>
  <div class="hamburger-badge" id="hamburger-badge"></div>
</button>

<!-- 이력 오버레이 -->
<div class="history-overlay" id="history-overlay" onclick="closeHistory()"></div>

<!-- 이력 드로어 -->
<div class="history-drawer" id="history-drawer">
  <div class="history-head">
    <span class="history-title">📋 내 번호 이력</span>

  </div>
</div>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">

<div id="result-popup" onclick="handlePopupBg(event)">

</div>

<!-- 페이지 본체 -->
<div class="page-wrap">

  <!-- 상단: 회차 선택 + 예상 번호 버튼 -->
  <div class="btn-card">
    <div class="btn-row">

        <select id="sel-start" class="draw-sel">

        </select>

      <div class="draw-select-wrap">
        <span class="draw-select-lbl">마지막회차</span>
        <select id="sel-end" class="draw-sel">
          <option value="1">1</option>
        </select>
      </div>
      <button id="btn-predict" onclick="onPredictClick()">예상 번호 조합 생성</button>

  </div>

  <!-- 두 카드 -->
  <div class="cards-wrap">

    <!-- 좌측: 다음 회차 추첨 예정 -->
    <div class="card card-upcoming">
      <div class="price-tag">1,000원 / 1게임</div>
      <div class="logo-wrap">
        <img src="/static/lotto-logo.svg" alt="Lotto 6/45"
             onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'"/>
        <span class="logo-fallback" id="logo-fallback" style="display:none">Lotto 6/45</span>
      </div>
      <div class="draw-no-wrap">
        <span class="draw-no-text">제<span id="next-draw-no">—</span>회</span>
      </div>
      <div class="draw-schedule-wrap">
        <span class="draw-schedule-text" id="next-draw-date">—</span>
      </div>
      <div class="cd-header">남은시간</div>
      <div class="countdown-row">
        <div class="cd-unit">
          <div class="cd-val" id="cd-d">--</div>

        </div>
        <div class="cd-unit">
          <div class="cd-val" id="cd-h">--</div>
          <div class="cd-lbl">시간</div>

          <div class="cd-val" id="cd-m">--</div>

    <!-- 우측: 최근 추첨 결과 -->
    <div class="card card-result">

      <div class="result-round-text" id="latest-round-no">제 — 회</div>
      <div class="result-date-text" id="latest-date">—</div>
      <div class="balls-row" id="latest-balls">
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="plus-sign">+</div>
        <div class="ball b-bonus" style="opacity:.22">?</div>
      </div>
      <div class="ball-label-row">
        <div class="label-section win-section">
          <div class="label-line"></div>
          <span class="label-txt">당첨번호</span>
          <div class="label-line"></div>
        </div>
        <div style="width:32px;flex-shrink:0"></div>
        <div class="label-section bonus-section">
          <div class="label-line"></div>
          <span class="label-txt">보너스번호</span>

        </div>
      </div>

  </div><!-- .cards-wrap -->

  <!-- 동기화 상태 바 -->
  <div class="sync-bar" id="sync-bar">
    <div class="sync-left">
      <span class="sync-dot idle" id="sync-dot"></span>
      <span class="sync-text" id="sync-text">동기화 상태 확인 중…</span>
    </div>
    <button class="sync-btn" id="sync-btn" onclick="doManualSync()">↻ 동기화</button>
  </div>

</div><!-- .page-wrap -->

<script>
// ── 배경 워터마크 숫자 ─────────────────────────────────────
(function(){
  const wrap = document.getElementById('bg-nums');
  const nums = [1,7,11,16,23,28,33,40,4,19,38,6,25,42,13,31,45,8,22,36,3,17,29,44,10];
  const pos  = [
    [5,3],[15,18],[25,7],[35,22],[50,5],[65,15],[78,3],[88,20],
    [5,40],[18,55],[30,38],[45,48],[60,35],[72,50],[85,42],
    [8,70],[20,78],[35,65],[50,72],[65,62],[78,80],[90,68],
    [3,88],[25,90],[55,88]
  ];
  nums.forEach((n, i) => {
    const el = document.createElement('div');
    el.className = 'bg-num';
    el.textContent = n;
    const [l, t] = pos[i] || [Math.random()*90, Math.random()*90];
    el.style.left = l + '%';
    el.style.top  = t + '%';
    wrap.appendChild(el);
  });
})();

// ── 번호 → 볼 클래스 ──────────────────────────────────────
function ballClass(n, isBonus) {
  if (isBonus) return 'b-bonus';
  if (n <= 10) return 'b1';
  if (n <= 20) return 'b2';
  if (n <= 30) return 'b3';
  if (n <= 40) return 'b4';
  return 'b5';
}
function makeBall(n, isBonus, extra) {
  const cls = ballClass(n, isBonus) + (extra ? ' ' + extra : '');
  return `<div class="ball ${cls}">${n}</div>`;
}

// ── 카운트다운 ─────────────────────────────────────────────
let _nextTs = 0;
function startCountdown() {
  function tick() {
    if (!_nextTs) return;
    const diff = _nextTs - Math.floor(Date.now() / 1000);
    if (diff <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    document.getElementById('cd-d').textContent = String(Math.floor(diff / 86400)).padStart(2, '0');
    document.getElementById('cd-h').textContent = String(Math.floor(diff % 86400 / 3600)).padStart(2, '0');
    document.getElementById('cd-m').textContent = String(Math.floor(diff % 3600 / 60)).padStart(2, '0');
    document.getElementById('cd-s').textContent = String(diff % 60).padStart(2, '0');
  }
  tick();
  setInterval(tick, 1000);
}

// ── 모바일 카드 높이 균일화 ───────────────────────────────
function equalizeCards() {
  const cards = document.querySelectorAll('.card');
  // 높이 초기화
  cards.forEach(c => { c.style.minHeight = ''; });
  if (window.innerWidth < 600) {
    // 가장 큰 카드 높이에 맞춤
    requestAnimationFrame(() => {
      const h = Math.max(...Array.from(cards).map(c => c.offsetHeight));
      if (h > 0) cards.forEach(c => { c.style.minHeight = h + 'px'; });
    });
  }
}
window.addEventListener('resize', equalizeCards);

// ── 회차 드롭다운 ─────────────────────────────────────────
let _latestDrawNo = 0;

function populateDropdowns(latestNo) {
  _latestDrawNo = latestNo;
  const selStart = document.getElementById('sel-start');
  const selEnd   = document.getElementById('sel-end');
  if (!selStart || !selEnd) return;

  // 1회 ~ 최신 회차까지 전체 옵션 생성
  let startHtml = '';
  let endHtml   = '';
  for (let i = 1; i <= latestNo; i++) {
    startHtml += `<option value="${i}">${i}</option>`;
    endHtml   += `<option value="${i}">${i}</option>`;
  }
  selStart.innerHTML = startHtml;
  selEnd.innerHTML   = endHtml;

  resetDropdowns();
}

function resetDropdowns() {
  const selStart = document.getElementById('sel-start');
  const selEnd   = document.getElementById('sel-end');
  if (selStart) selStart.value = '1';
  if (selEnd && _latestDrawNo) selEnd.value = String(_latestDrawNo);
}

// ── UTC → KST 변환 ───────────────────────────────────────
function utcToKST(utcStr) {
  const d = new Date(utcStr);
  const kst = new Date(d.getTime() + 9 * 3600 * 1000);
  // "YYYY-MM-DD HH:MM" 형식으로 반환
  return kst.toISOString().slice(0, 16).replace('T', ' ');
}

// ── 동기화 상태 UI ──────────────────────────────────────
let _syncPollTimer = null;

function updateSyncUI(sync) {
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  const btn  = document.getElementById('sync-btn');
  if (!dot || !text) return;

  dot.className = 'sync-dot ' + (sync.state || 'idle');

  if (sync.state === 'syncing') {
    text.textContent = sync.message || '동기화 중…';
    if (btn) btn.disabled = true;
    if (!_syncPollTimer)
      _syncPollTimer = setInterval(pollSyncStatus, 2500);
  } else {
    if (btn) btn.disabled = false;
    if (_syncPollTimer) { clearInterval(_syncPollTimer); _syncPollTimer = null; }
    if (sync.state === 'done') {
      const max = sync.max_draw_in_db ? `${sync.max_draw_in_db}회 최신` : '';
      const last = sync.last_sync ? ` · ${utcToKST(sync.last_sync)} KST` : '';
      text.textContent = max + last || sync.message || '동기화 완료';
    } else if (sync.state === 'error') {
      text.textContent = '동기화 오류: ' + (sync.message || '');
    } else {
      text.textContent = sync.message || '동기화 대기 중';
    }
  }
}

async function pollSyncStatus() {
  try {
    const res  = await fetch('/api/sync_status');
    const sync = await res.json();
    updateSyncUI(sync);
    if (sync.state === 'done' || sync.state === 'error') {
      loadInfo();  // 완료되면 최신 정보 다시 로드
    }
  } catch(e) {}
}

async function doManualSync() {
  const btn = document.getElementById('sync-btn');
  if (btn) btn.disabled = true;
  try {
    await fetch('/api/sync', { method: 'POST' });
    setTimeout(pollSyncStatus, 800);
  } catch(e) {
    if (btn) btn.disabled = false;
  }
}

// ── /api/info 로드 ────────────────────────────────────────
async function loadInfo() {
  try {
    const res  = await fetch('/api/info');
    const json = await res.json();
    if (json.status !== 'ok') return;

    document.getElementById('next-draw-no').textContent   = json.next_draw_no  || '—';
    document.getElementById('next-draw-date').textContent = (json.next_draw_date || '') + ' 추첨 예정';
    _nextTs = json.next_draw_ts || 0;
    startCountdown();

    document.getElementById('latest-round-no').textContent = '제' + (json.latest_draw_no || '—') + '회';
    document.getElementById('latest-date').textContent     = (json.latest_date || '') + ' 추첨';

    const nums  = json.latest_numbers || [];
    const bonus = json.latest_bonus;
    if (nums.length === 6) {
      const ballsEl = document.getElementById('latest-balls');
      ballsEl.innerHTML =
        nums.map(n => makeBall(n, false)).join('') +
        '<div class="plus-sign">+</div>' +
        makeBall(bonus, true);
    }

    // 드롭다운 초기화 (최신 회차 기준)
    if (json.latest_draw_no) populateDropdowns(json.latest_draw_no);

    // 동기화 상태 업데이트
    if (json.sync) updateSyncUI(json.sync);

  } catch(e) {
    console.warn('loadInfo 실패:', e);
  } finally {
    // 데이터 로드 후 높이 균일화
    equalizeCards();
  }
}

// ── 예상 번호 버튼 ─────────────────────────────────────────
async function onPredictClick() {
  const ov  = document.getElementById('loading-overlay');
  const btn = document.getElementById('btn-predict');
  ov.classList.add('show');
  btn.disabled = true;

  try {
    const startDraw = parseInt(document.getElementById('sel-start')?.value || '1');
    const maxDraw   = parseInt(document.getElementById('sel-end')?.value   || '0');
    const cfg = {
      start_draw: startDraw, max_draw: maxDraw, deadzone_window:25,
      top_candidate_count:20, output_limit:5,
      recent_weight:40, missing_weight:20, square_weight:0,
      deadzone_weight:15, zone_weight:15, mix_previous_ratio:5,
      max_overlap:3, max_popularity_risk:3,
      backtest_rounds:100, backtest_train_window:150,
      sum_min:100, sum_max:170, min_ac:7,
      odd_min:2, odd_max:4, high_min:2, high_max:4,
    };
    const res  = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(cfg),
    });
    const json = await res.json();
    ov.classList.remove('show');
    btn.disabled = false;
    if (json.status !== 'ok') { alert('오류: ' + (json.message || '서버 오류')); return; }
    renderPopup(json, startDraw, maxDraw);
    // 자동저장 후 배지 갱신
    fetch('/api/my_history').then(r => r.json()).then(j => {
      if (j.status === 'ok') {
        const sessions = new Set((j.history || []).map(h => h.session_id));
        _updateBadge(sessions.size);
      }
    }).catch(() => {});
  } catch(e) {
    ov.classList.remove('show');
    btn.disabled = false;
    alert('요청 실패: ' + e.message);
  }
}

// ── 팝업 렌더링 (순위 / 번호 / 총점) ─────────────────────
function renderPopup(json, startDraw, maxDraw) {
  const combos   = json.combinations || [];
  const data     = json.data || {};
  const nextNo   = (data.latest_draw_no || 0) + 1;
  const endNo    = maxDraw || data.latest_draw_no || 0;
  const startNo  = startDraw || 1;

  document.getElementById('popup-info').textContent = data.latest_draw_no
    ? `제${nextNo}회 예상 번호 : ${startNo}회~${endNo}회 분석`
    : '';

  const tbody = document.getElementById('combo-tbody');
  tbody.innerHTML = '';
  combos.forEach((c, i) => {
    const tr    = document.createElement('tr');
    const balls = c.numbers.map(n => makeBall(n, false, 'ball-xs')).join('');
    tr.innerHTML = `
      <td class="td-rank">${i + 1}</td>
      <td><div class="td-balls">${balls}</div></td>
      <td class="td-score">${c.score.toFixed(1)}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('result-popup').classList.add('show');
}

function handlePopupBg(e) {
  if (e.target === document.getElementById('result-popup')) {
    document.getElementById('result-popup').classList.remove('show');
    resetDropdowns();
  }
}
function closePopupBtn() {
  document.getElementById('result-popup').classList.remove('show');
  resetDropdowns();
}

// ── 이력 드로어 ───────────────────────────────────────────
function openHistory() {
  document.getElementById('history-overlay').classList.add('open');
  document.getElementById('history-drawer').classList.add('open');
  loadHistory();
}
function closeHistory() {
  document.getElementById('history-overlay').classList.remove('open');
  document.getElementById('history-drawer').classList.remove('open');
}

function _matchBadge(matchCount, bonusMatch) {
  if (matchCount === null) return '<span class="match-badge mb-pending">⏳ 추첨 전</span>';
  if (matchCount === 6)              return '<span class="match-badge mb-1st">🎉 1등!</span>';
  if (matchCount === 5 && bonusMatch) return '<span class="match-badge mb-2nd">2등 (5+보너스)</span>';
  if (matchCount === 5)              return '<span class="match-badge mb-5">3등 (5개)</span>';
  if (matchCount === 4)              return '<span class="match-badge mb-4">4등 (4개)</span>';
  if (matchCount === 3)              return '<span class="match-badge mb-3">5등 (3개)</span>';
  return `<span class="match-badge mb-${matchCount}">${matchCount}개 일치</span>`;
}

function _ballSmHtml(n, isMatch, hasActual) {
  const cls = ballClass(n, false);
  const dim = hasActual && !isMatch ? ' dim' : '';
  return `<div class="ball-sm ${cls}${dim}">${n}</div>`;
}

function _updateBadge(count) {
  const badge = document.getElementById('hamburger-badge');
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count > 9 ? '9+' : String(count);
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

async function loadHistory() {
  const body = document.getElementById('history-body');
  body.innerHTML = '<p class="history-empty"><span>⏳</span>불러오는 중…</p>';
  try {
    const res  = await fetch('/api/my_history');
    const json = await res.json();
    if (json.status !== 'ok' || !json.history.length) {
      body.innerHTML = '<p class="history-empty"><span>📭</span>아직 저장된 번호가 없습니다<br>예상 번호를 생성하면 자동으로 저장됩니다</p>';
      _updateBadge(0);
      return;
    }

    // session_id 기준으로 그룹핑
    const groupMap = new Map();
    json.history.forEach(item => {
      if (!groupMap.has(item.session_id)) {
        groupMap.set(item.session_id, {
          session_id: item.session_id,
          saved_at:   item.saved_at,
          target_no:  item.target_no,
          items:      []
        });
      }
      groupMap.get(item.session_id).items.push(item);
    });

    const groups = [...groupMap.values()].sort((a, b) => b.saved_at.localeCompare(a.saved_at));
    _updateBadge(groups.length);

    body.innerHTML = groups.map(group => {
      const kst   = utcToKST(group.saved_at);
      const items = group.items.sort((a, b) => a.rank - b.rank);

      const itemsHtml = items.map(item => {
        const matchedSet  = item.actual_numbers ? new Set(item.actual_numbers) : null;
        const hasActual   = !!matchedSet;
        const ballsHtml   = item.numbers.map(n =>
          _ballSmHtml(n, matchedSet ? matchedSet.has(n) : true, hasActual)
        ).join('');
        return `
          <div class="history-item">
            <span class="history-rank">${item.rank}</span>
            <div class="history-balls">${ballsHtml}</div>
            <span class="history-score">${(item.score || 0).toFixed(1)}</span>
            <span class="history-match">${_matchBadge(item.match_count, item.bonus_match)}</span>
          </div>`;
      }).join('');

      const sid = encodeURIComponent(group.session_id);
      return `
        <div class="history-group">
          <div class="history-group-header">
            <span class="history-group-title">제${group.target_no}회 예상</span>
            <div class="history-group-meta-wrap">
              <span class="history-group-meta">${kst}</span>
              <button class="history-group-del" onclick="deleteSession('${sid}')" title="이 묶음 삭제">✕</button>
            </div>
          </div>
          ${itemsHtml}
        </div>`;
    }).join('');
  } catch(e) {
    body.innerHTML = '<p class="history-empty"><span>⚠️</span>불러오기 실패</p>';
  }
}

async function deleteSession(encodedId) {
  try {
    await fetch(`/api/my_history/session/${encodedId}`, { method: 'DELETE' });
    loadHistory();
  } catch(e) {}
}

async function clearAllHistory() {
  if (!confirm('저장된 번호 이력을 모두 삭제하시겠습니까?')) return;
  try {
    await fetch('/api/my_history', { method: 'DELETE' });
    loadHistory();
  } catch(e) {}
}

// ── 초기 실행 ─────────────────────────────────────────────
loadInfo();
pollSyncStatus();  // 즉시 동기화 상태 확인 (서버 시작 시 자동 동기화 중일 수 있음)
// 배지 초기화
fetch('/api/my_history').then(r => r.json()).then(json => {
  if (json.status === 'ok') {
    const sessions = new Set((json.history || []).map(h => h.session_id));
    _updateBadge(sessions.size);
  }
}).catch(() => {});
</script>
