<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>로또번호 랜덤 생성</title>
<link rel="icon" type="image/png" href="/favicon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;
  font-family:"Malgun Gothic","Apple SD Gothic Neo","나눔고딕","Nanum Gothic",sans-serif;
  background:#e52748;
  color:#222;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}

/* ── 배경 워터마크 ── */
.bg-wrap{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-num{
  position:absolute;font-weight:900;
  font-size:clamp(60px,9vw,130px);
  color:rgba(255,255,255,.055);
  line-height:1;user-select:none;
}

/* ── 페이지 래퍼 ── */
.page-wrap{
  position:relative;z-index:1;
  min-height:100vh;
  padding:14px 14px 48px;
  display:flex;flex-direction:column;
  align-items:center;gap:12px;
}

/* ── 버튼 카드 ── */
.btn-card{
  width:100%;max-width:860px;
  background:#fff;
  border-radius:14px;
  box-shadow:0 3px 16px rgba(0,0,0,.12);
  padding:14px 16px;
}
#btn-predict{
  width:100%;padding:15px 10px;
  background:#e52748;color:#fff;
  border:none;border-radius:8px;
  font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:-.2px;
  font-family:inherit;
  transition:opacity .15s,transform .08s;
}
#btn-predict:hover{opacity:.88}
#btn-predict:active{transform:scale(.99);opacity:.8}
#btn-predict:disabled{opacity:.55;cursor:not-allowed}

/* ── 카드 컨테이너 ── */
.cards-wrap{
  width:100%;max-width:860px;
  display:flex;gap:12px;align-items:flex-start;
}

/* ── 공통 카드 ── */
.card{
  background:#fff;
  border-radius:14px;
  box-shadow:0 3px 16px rgba(0,0,0,.12);
  padding:18px 18px 20px;
  flex:1;min-width:0;
}

/* ── 좌측 카드 ── */
.price-tag{
  text-align:right;
  font-size:11px;
  color:#bbb;
  margin-bottom:10px;
  font-weight:400;
}

.logo-wrap{
  text-align:center;
  padding-bottom:14px;
  margin-bottom:14px;
  border-bottom:1px solid #f0f0f0;
}
.logo-wrap img{
  height:36px;
  max-width:170px;
  object-fit:contain;
}
.logo-fallback{
  font-size:18px;font-weight:800;
  color:#e52748;letter-spacing:-1px;
}

.draw-no-wrap{text-align:center;margin-bottom:3px}
.draw-no-text{
  font-size:26px;font-weight:800;
  color:#111;letter-spacing:-.5px;
}

.draw-schedule-wrap{text-align:center;margin-bottom:14px}
.draw-schedule-text{
  font-size:12px;font-weight:500;
  color:#e52748;
}

.cd-header{
  text-align:center;
  font-size:11px;color:#bbb;
  margin-bottom:6px;
}

.countdown-row{
  display:flex;justify-content:center;
  align-items:flex-start;gap:0;
}
.cd-unit{
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 8px;
}
.cd-val{
  font-size:46px;font-weight:800;
  color:#e52748;line-height:1;
  letter-spacing:-.5px;
  min-width:48px;text-align:center;
}
.cd-lbl{
  font-size:10px;color:#bbb;
  margin-top:5px;
}

/* ── 우측 카드 ── */
.result-header-label{
  text-align:center;font-size:11px;
  color:#bbb;margin-bottom:4px;
  letter-spacing:.2px;
}
.result-round-text{
  text-align:center;
  font-size:26px;font-weight:800;
  color:#111;letter-spacing:-.5px;
  margin-bottom:2px;
}
.result-date-text{
  text-align:center;
  font-size:12px;color:#bbb;
  margin-bottom:16px;
}

.balls-row{
  display:flex;align-items:center;
  justify-content:center;
  gap:5px;flex-wrap:nowrap;
  margin-bottom:8px;
}
.ball{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  box-shadow:0 2px 7px rgba(0,0,0,.18);
  flex-shrink:0;
  text-shadow:0 1px 3px rgba(0,0,0,.22);
}
.plus-sign{
  font-size:16px;color:#ddd;
  font-weight:300;margin:0 1px;flex-shrink:0;
}

.b1{background:radial-gradient(circle at 38% 35%,#ffe566 0%,#FBC400 100%)}
.b2{background:radial-gradient(circle at 38% 35%,#a6e8fa 0%,#69C8F2 100%)}
.b3{background:radial-gradient(circle at 38% 35%,#ffa0a0 0%,#FF6969 100%)}
.b4{background:radial-gradient(circle at 38% 35%,#d8d8d8 0%,#AAAAAA 100%)}
.b5{background:radial-gradient(circle at 38% 35%,#d5ed74 0%,#B0D840 100%)}
.b-bonus{background:radial-gradient(circle at 38% 35%,#c0c0c0 0%,#888888 100%)}

/* 당첨번호 / 보너스번호 라벨 */
.ball-label-row{
  display:flex;align-items:center;
  width:100%;gap:6px;
}
.label-section{
  display:flex;align-items:center;gap:0;
}
.label-section.win-section{flex:6}
.label-section.bonus-section{flex:1}
.label-line{flex:1;height:1px;background:#e6e6e6}
.label-txt{
  font-size:10px;color:#bbb;
  white-space:nowrap;padding:0 5px;
  flex-shrink:0;
}

/* ── 로딩 ── */
#loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.52);z-index:500;
  align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
}
#loading-overlay.show{display:flex}
.spinner{
  width:44px;height:44px;
  border:4px solid rgba(255,255,255,.28);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:13px;font-weight:600;font-family:inherit}

/* ── 결과 팝업 ── */
#result-popup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.58);z-index:400;
  align-items:center;justify-content:center;
  padding:16px;
}
#result-popup.show{display:flex}
.popup-card{
  background:#fff;
  border-radius:14px;
  box-shadow:0 8px 40px rgba(0,0,0,.28);
  padding:20px 18px;
  width:100%;max-width:400px;
  max-height:88vh;overflow-y:auto;
}
.popup-head{
  display:flex;align-items:center;
  justify-content:space-between;
  padding-bottom:10px;
  border-bottom:1px solid #f0f0f0;
  margin-bottom:8px;
}
.popup-title{font-size:14px;font-weight:800;color:#111}
.popup-close-btn{
  background:#f5f5f5;border:none;border-radius:50%;
  width:28px;height:28px;font-size:14px;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:#888;
  font-family:inherit;
}
.popup-close-btn:hover{background:#ebebeb}
.popup-info{
  font-size:11px;color:#bbb;
  text-align:center;
  margin-bottom:12px;
}

/* 조합 테이블 */
.combo-tbl{width:100%;border-collapse:collapse}
.combo-tbl th{
  font-size:10px;color:#bbb;font-weight:600;
  padding:4px 2px;text-align:center;
  border-bottom:1px solid #efefef;
}
.combo-tbl td{
  padding:8px 2px;
  text-align:center;
  border-bottom:1px solid #f7f7f7;
  vertical-align:middle;
}
.combo-tbl tr:last-child td{border-bottom:none}
.td-rank{
  font-size:13px;font-weight:700;
  color:#e52748;width:26px;
}
.td-balls{
  display:flex;align-items:center;
  justify-content:center;gap:3px;
  flex-wrap:wrap;
}
.ball-xs{width:26px;height:26px;font-size:9px}
.td-score{font-size:12px;font-weight:700;color:#333;width:44px}

.popup-note{
  font-size:10px;color:#ccc;
  text-align:center;margin-top:12px;
}

/* ── 반응형 ── */
@media(max-width:620px){
  .cards-wrap{flex-direction:column}
  .cd-val{font-size:36px;min-width:38px}
  .cd-unit{padding:0 5px}
  .draw-no-text,.result-round-text{font-size:22px}
  .ball{width:34px;height:34px;font-size:11px}
  .logo-wrap img{height:30px}
}
@media(max-width:360px){
  .cd-val{font-size:30px;min-width:32px}
  .ball{width:28px;height:28px;font-size:10px}
}
</style>
</head>
<body>

<!-- 배경 워터마크 -->
<div class="bg-wrap" id="bg-nums"></div>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p class="loading-txt" id="loading-txt">AI 분석 중... 잠시만 기다려 주세요</p>
</div>

<!-- 결과 팝업 -->
<div id="result-popup" onclick="handlePopupBg(event)">
  <div class="popup-card">
    <div class="popup-head">
      <span class="popup-title">AI 예상 번호 조합</span>
      <button class="popup-close-btn" onclick="closePopupBtn()">✕</button>
    </div>
    <p class="popup-info" id="popup-info"></p>
    <table class="combo-tbl">
      <thead>
        <tr>
          <th>순위</th>
          <th>번호</th>
          <th>총점</th>
        </tr>
      </thead>
      <tbody id="combo-tbody"></tbody>
    </table>
    <p class="popup-note">※ AI 분석 결과는 참고용이며 당첨을 보장하지 않습니다</p>
  </div>
</div>

<!-- 페이지 본체 -->
<div class="page-wrap">

  <!-- 상단 예상 번호 버튼 -->
  <div class="btn-card">
    <button id="btn-predict" onclick="onPredictClick()">예상 번호 조합 생성</button>
  </div>

  <!-- 두 카드 -->
  <div class="cards-wrap">

    <!-- 좌측: 다음 회차 -->
    <div class="card">
      <div class="price-tag">1,000원 / 1게임</div>
      <div class="logo-wrap">
        <img src="/static/lotto-logo.svg" alt="Lotto 6/45"
             onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'"/>
        <span class="logo-fallback" id="logo-fallback" style="display:none">Lotto 6/45</span>
      </div>
      <div class="draw-no-wrap">
        <span class="draw-no-text">제<span id="next-draw-no">—</span>회</span>
      </div>
      <div class="draw-schedule-wrap">
        <span class="draw-schedule-text" id="next-draw-date">—</span>
      </div>
      <div class="cd-header">남은시간</div>
      <div class="countdown-row">
        <div class="cd-unit">
          <div class="cd-val" id="cd-d">--</div>
          <div class="cd-lbl">일</div>
        </div>
        <div class="cd-unit">
          <div class="cd-val" id="cd-h">--</div>
          <div class="cd-lbl">시간</div>
        </div>
        <div class="cd-unit">
          <div class="cd-val" id="cd-m">--</div>
          <div class="cd-lbl">분</div>
        </div>
        <div class="cd-unit">
          <div class="cd-val" id="cd-s">--</div>
          <div class="cd-lbl">초</div>
        </div>
      </div>
    </div>

    <!-- 우측: 최근 추첨 결과 -->
    <div class="card">
      <div class="result-header-label">최근 추첨 결과</div>
      <div class="result-round-text" id="latest-round-no">제 — 회</div>
      <div class="result-date-text" id="latest-date">—</div>
      <div class="balls-row" id="latest-balls">
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="ball b4" style="opacity:.22">?</div>
        <div class="plus-sign">+</div>
        <div class="ball b-bonus" style="opacity:.22">?</div>
      </div>
      <div class="ball-label-row">
        <div class="label-section win-section">
          <div class="label-line"></div>
          <span class="label-txt">당첨번호</span>
          <div class="label-line"></div>
        </div>
        <div style="width:26px;flex-shrink:0"></div>
        <div class="label-section bonus-section">
          <div class="label-line"></div>
          <span class="label-txt">보너스번호</span>
          <div class="label-line"></div>
        </div>
      </div>
    </div>

  </div><!-- .cards-wrap -->
</div><!-- .page-wrap -->

<script>
// ── 배경 워터마크 숫자 ─────────────────────────────────────
(function(){
  const wrap = document.getElementById('bg-nums');
  const nums = [1,7,11,16,23,28,33,40,4,19,38,6,25,42,13,31,45,8,22,36,3,17,29,44,10];
  const pos  = [
    [5,3],[15,18],[25,7],[35,22],[50,5],[65,15],[78,3],[88,20],
    [5,40],[18,55],[30,38],[45,48],[60,35],[72,50],[85,42],
    [8,70],[20,78],[35,65],[50,72],[65,62],[78,80],[90,68],
    [3,88],[25,90],[55,88]
  ];
  nums.forEach((n, i) => {
    const el = document.createElement('div');
    el.className = 'bg-num';
    el.textContent = n;
    const [l, t] = pos[i] || [Math.random()*90, Math.random()*90];
    el.style.left = l + '%';
    el.style.top  = t + '%';
    wrap.appendChild(el);
  });
})();

// ── 번호 → 볼 클래스 ──────────────────────────────────────
function ballClass(n, isBonus) {
  if (isBonus) return 'b-bonus';
  if (n <= 10) return 'b1';
  if (n <= 20) return 'b2';
  if (n <= 30) return 'b3';
  if (n <= 40) return 'b4';
  return 'b5';
}
function makeBall(n, isBonus, extra) {
  const cls = ballClass(n, isBonus) + (extra ? ' ' + extra : '');
  return `<div class="ball ${cls}">${n}</div>`;
}

// ── 카운트다운 ─────────────────────────────────────────────
let _nextTs = 0;
function startCountdown() {
  function tick() {
    if (!_nextTs) return;
    const diff = _nextTs - Math.floor(Date.now() / 1000);
    if (diff <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    document.getElementById('cd-d').textContent = String(Math.floor(diff / 86400)).padStart(2, '0');
    document.getElementById('cd-h').textContent = String(Math.floor(diff % 86400 / 3600)).padStart(2, '0');
    document.getElementById('cd-m').textContent = String(Math.floor(diff % 3600 / 60)).padStart(2, '0');
    document.getElementById('cd-s').textContent = String(diff % 60).padStart(2, '0');
  }
  tick();
  setInterval(tick, 1000);
}

// ── /api/info 로드 ────────────────────────────────────────
async function loadInfo() {
  try {
    const res  = await fetch('/api/info');
    const json = await res.json();
    if (json.status !== 'ok') return;

    document.getElementById('next-draw-no').textContent   = json.next_draw_no  || '—';
    document.getElementById('next-draw-date').textContent = (json.next_draw_date || '') + ' 추첨 예정';
    _nextTs = json.next_draw_ts || 0;
    startCountdown();

    document.getElementById('latest-round-no').textContent = '제' + (json.latest_draw_no || '—') + '회';
    document.getElementById('latest-date').textContent     = (json.latest_date || '') + ' 추첨';

    const nums  = json.latest_numbers || [];
    const bonus = json.latest_bonus;
    if (nums.length === 6) {
      const ballsEl = document.getElementById('latest-balls');
      ballsEl.innerHTML =
        nums.map(n => makeBall(n, false)).join('') +
        '<div class="plus-sign">+</div>' +
        makeBall(bonus, true);
    }
  } catch(e) {
    console.warn('loadInfo 실패:', e);
  }
}

// ── 예상 번호 버튼 ─────────────────────────────────────────
async function onPredictClick() {
  const ov  = document.getElementById('loading-overlay');
  const btn = document.getElementById('btn-predict');
  ov.classList.add('show');
  btn.disabled = true;

  try {
    const cfg = {
      start_draw:1, max_draw:0, deadzone_window:25,
      top_candidate_count:20, output_limit:5,
      recent_weight:40, missing_weight:20, square_weight:0,
      deadzone_weight:15, zone_weight:15, mix_previous_ratio:5,
      max_overlap:3, max_popularity_risk:3,
      backtest_rounds:100, backtest_train_window:150,
      sum_min:100, sum_max:170, min_ac:7,
      odd_min:2, odd_max:4, high_min:2, high_max:4,
    };
    const res  = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(cfg),
    });
    const json = await res.json();
    ov.classList.remove('show');
    btn.disabled = false;
    if (json.status !== 'ok') { alert('오류: ' + (json.message || '서버 오류')); return; }
    renderPopup(json);
  } catch(e) {
    ov.classList.remove('show');
    btn.disabled = false;
    alert('요청 실패: ' + e.message);
  }
}

// ── 팝업 렌더링 (순위 / 번호 / 총점) ─────────────────────
function renderPopup(json) {
  const combos = json.combinations || [];
  const data   = json.data || {};

  document.getElementById('popup-info').textContent = data.latest_draw_no
    ? `제${data.latest_draw_no + 1}회 예상 번호 · ${(data.total_draws || 0).toLocaleString()}회차 분석`
    : '';

  const tbody = document.getElementById('combo-tbody');
  tbody.innerHTML = '';
  combos.forEach((c, i) => {
    const tr    = document.createElement('tr');
    const balls = c.numbers.map(n => makeBall(n, false, 'ball-xs')).join('');
    tr.innerHTML = `
      <td class="td-rank">${i + 1}</td>
      <td><div class="td-balls">${balls}</div></td>
      <td class="td-score">${c.score.toFixed(1)}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('result-popup').classList.add('show');
}

function handlePopupBg(e) {
  if (e.target === document.getElementById('result-popup'))
    document.getElementById('result-popup').classList.remove('show');
}
function closePopupBtn() {
  document.getElementById('result-popup').classList.remove('show');
}

// ── 초기 실행 ─────────────────────────────────────────────
loadInfo();
</script>
</body>
</html>
