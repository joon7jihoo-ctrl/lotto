<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>로또번호 랜덤 생성</title>
<link rel="icon" type="image/png" href="/favicon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:"Apple SD Gothic Neo","Malgun Gothic","Nanum Gothic",sans-serif;background:#f04060;color:#222}

/* ── 배경 워터마크 숫자 ── */
.bg-wrap{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-num{position:absolute;font-size:clamp(48px,8vw,110px);font-weight:900;color:rgba(255,255,255,0.07);line-height:1;user-select:none}

/* ── 전체 레이아웃 ── */
.page-wrap{position:relative;z-index:1;min-height:100vh;padding:16px 12px 32px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* ── 상단 버튼 ── */
#top-bar{width:100%;max-width:900px}
#btn-predict{
  width:100%;padding:18px 20px;
  background:#e8213a;color:#fff;
  border:none;border-radius:10px;
  font-size:18px;font-weight:800;
  cursor:pointer;letter-spacing:-.3px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  transition:opacity .15s,transform .1s;
}
#btn-predict:hover{opacity:.92}
#btn-predict:active{transform:scale(.985)}
#btn-predict:disabled{opacity:.6;cursor:not-allowed}

/* ── 카드 컨테이너 ── */
.main-wrap{
  width:100%;max-width:900px;
  display:flex;flex-wrap:wrap;
  gap:14px;align-items:flex-start;
}

/* ── 공통 카드 ── */
.card{
  background:#fff;border-radius:20px;
  box-shadow:0 6px 32px rgba(0,0,0,.18);
  padding:20px 22px;flex:1;min-width:280px;
}

/* ── 좌측 카드 (다음 회차) ── */
.card-upcoming .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.lotto-badge{background:#e8213a;color:#fff;font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;letter-spacing:.5px}
.lotto-title{font-size:17px;font-weight:800;color:#222}
.lotto-subtitle{font-size:11px;color:#888;margin-top:1px}

.draw-no-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.draw-label{font-size:12px;color:#888}
.draw-no{font-size:26px;font-weight:900;color:#e8213a}
.draw-sub{font-size:12px;color:#aaa}

.countdown-label{font-size:11px;color:#888;margin-bottom:4px}
.countdown-wrap{display:flex;gap:6px;margin-bottom:14px}
.cd-unit{display:flex;flex-direction:column;align-items:center;gap:2px}
.cd-val{font-size:22px;font-weight:900;color:#e8213a;min-width:44px;text-align:center;background:#fff5f5;border-radius:8px;padding:4px 6px;line-height:1}
.cd-lbl{font-size:9px;color:#aaa}
.cd-sep{font-size:22px;font-weight:900;color:#e8213a;line-height:1;align-self:flex-start;margin-top:6px}

.prize-row{font-size:12px;color:#888;margin-bottom:16px}
.prize-row b{color:#e8213a}

.btn-buy{
  display:block;width:100%;padding:14px;
  background:#e8213a;color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:800;
  cursor:pointer;text-align:center;letter-spacing:-.2px;
  text-decoration:none;transition:opacity .15s;
}
.btn-buy:hover{opacity:.88}

/* ── 우측 카드 (최근 추첨) ── */
.card-result .result-header{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.result-title{font-size:16px;font-weight:800;color:#222}
.result-round{font-size:13px;color:#888}
.result-date{font-size:11px;color:#bbb}

.balls-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ball{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;
  box-shadow:0 3px 8px rgba(0,0,0,.20);
  flex-shrink:0;text-shadow:0 1px 2px rgba(0,0,0,.25);
}
.ball-sm{width:36px;height:36px;font-size:12px}
.ball-xs{width:30px;height:30px;font-size:11px}
.plus-sign{font-size:18px;color:#ccc;font-weight:300}

/* 번호별 색상 */
.b1 {background:linear-gradient(145deg,#ffd233,#FBC400)}
.b2 {background:linear-gradient(145deg,#86d9f9,#69C8F2)}
.b3 {background:linear-gradient(145deg,#ff8989,#FF6969)}
.b4 {background:linear-gradient(145deg,#c5c5c5,#AAAAAA)}
.b5 {background:linear-gradient(145deg,#c7e85d,#B0D840)}
.b-bonus{background:linear-gradient(145deg,#aaa,#888);opacity:.85}

.result-prize{font-size:12px;color:#888;margin-bottom:14px}
.result-prize b{color:#e8213a}

.nav-links{display:flex;flex-direction:column;gap:6px}
.nav-link{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;background:#f9f9f9;border-radius:8px;
  font-size:12px;color:#555;text-decoration:none;
  transition:background .12s;
}
.nav-link:hover{background:#f0f0f0}
.nav-link .arrow{color:#ccc;font-size:14px}

/* ── 로딩 오버레이 ── */
#loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:500;
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
#loading-overlay.show{display:flex}
.spinner{
  width:50px;height:50px;
  border:5px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:#fff;font-size:14px;font-weight:600}

/* ── 시간 제한 배너 ── */
#time-lock{
  display:none;
  background:rgba(0,0,0,.7);color:#fff;
  padding:14px 22px;border-radius:12px;
  font-size:14px;font-weight:700;text-align:center;
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:600;min-width:260px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#time-lock.show{display:block}

/* ── 결과 팝업 ── */
#result-popup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);z-index:400;
  align-items:center;justify-content:center;
  padding:16px;
}
#result-popup.show{display:flex}
.popup-card{
  background:#fff;border-radius:20px;
  box-shadow:0 8px 48px rgba(0,0,0,.35);
  padding:22px 20px;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;
}
.popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.popup-title{font-size:16px;font-weight:900;color:#222}
.popup-close{
  background:#f0f0f0;border:none;border-radius:50%;
  width:32px;height:32px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#666;
}
.popup-close:hover{background:#e0e0e0}
.combo-row{
  border-bottom:1px solid #f0f0f0;padding:12px 0;
}
.combo-row:last-child{border-bottom:none}
.combo-rank{font-size:20px;margin-bottom:8px}
.combo-balls{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.combo-meta{font-size:11px;color:#999}

/* ── 경고 배너 ── */
.warn-banner{
  width:100%;max-width:900px;
  background:rgba(255,255,255,.2);border-radius:10px;
  padding:10px 16px;font-size:12px;color:#fff;
}

/* ── 반응형 ── */
@media(max-width:599px){
  .card{padding:16px 16px}
  #btn-predict{font-size:15px;padding:15px 16px}
  .draw-no{font-size:20px}
  .cd-val{font-size:18px;min-width:36px}
  .ball{width:36px;height:36px;font-size:12px}
}
</style>
</head>
<body>

<!-- 배경 워터마크 -->
<div class="bg-wrap" id="bg-nums"></div>

<!-- 로딩 -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p class="loading-msg" id="loading-msg">AI 분석 중...</p>
</div>

<!-- 시간 제한 -->
<div id="time-lock">
  ⏰ 예상 번호는 <b>오후 6시 이후</b>에 확인할 수 있습니다
</div>

<!-- 결과 팝업 -->
<div id="result-popup" onclick="closePopup(event)">
  <div class="popup-card">
    <div class="popup-header">
      <div class="popup-title">🎯 AI 예상 번호 조합</div>
      <button class="popup-close" onclick="closePopupBtn()">✕</button>
    </div>
    <div id="popup-draw-info" style="font-size:12px;color:#888;margin-bottom:14px"></div>
    <div id="popup-combos"></div>
    <div id="popup-warnings" style="margin-top:12px;font-size:11px;color:#e8213a"></div>
    <p style="font-size:10px;color:#ccc;margin-top:14px;text-align:center">
      ※ AI 분석 결과는 참고용이며 당첨을 보장하지 않습니다
    </p>
  </div>
</div>

<!-- 페이지 본체 -->
<div class="page-wrap">

  <!-- 상단 예상 번호 버튼 -->
  <div id="top-bar">
    <button id="btn-predict" onclick="onPredictClick()">🎯 예상 번호 조합 생성</button>
  </div>

  <!-- 두 카드 -->
  <div class="main-wrap">

    <!-- 좌측: 다음 회차 -->
    <div class="card card-upcoming">
      <div class="logo-row">
        <span class="lotto-badge">LOTTO</span>
        <div>
          <div class="lotto-title">로또 6/45</div>
          <div class="lotto-subtitle">매주 토요일 추첨</div>
        </div>
      </div>

      <div class="draw-no-row">
        <span class="draw-label">제</span>
        <span class="draw-no" id="next-draw-no">—</span>
        <span class="draw-sub">회</span>
        <span class="draw-sub" id="next-draw-date" style="margin-left:4px"></span>
      </div>

      <div class="countdown-label">추첨까지 남은 시간</div>
      <div class="countdown-wrap" id="countdown-wrap">
        <div class="cd-unit">
          <div class="cd-val" id="cd-d">--</div>
          <div class="cd-lbl">일</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-val" id="cd-h">--</div>
          <div class="cd-lbl">시간</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-val" id="cd-m">--</div>
          <div class="cd-lbl">분</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-val" id="cd-s">--</div>
          <div class="cd-lbl">초</div>
        </div>
      </div>

      <div class="prize-row">
        1등 예상 당첨금 <b id="next-prize">동행복권 사이트 참조</b>
      </div>

      <button class="btn-buy" onclick="buyLotto()">바로구매</button>
    </div>

    <!-- 우측: 최근 추첨 결과 -->
    <div class="card card-result">
      <div class="result-header">
        <div class="result-title">최근 추첨 결과</div>
        <div class="result-round" id="latest-round">제 — 회</div>
        <div class="result-date" id="latest-date"></div>
      </div>

      <div class="balls-row" id="latest-balls">
        <!-- JS로 채워짐 -->
        <div class="ball b4" style="opacity:.3">?</div>
        <div class="ball b4" style="opacity:.3">?</div>
        <div class="ball b4" style="opacity:.3">?</div>
        <div class="ball b4" style="opacity:.3">?</div>
        <div class="ball b4" style="opacity:.3">?</div>
        <div class="ball b4" style="opacity:.3">?</div>
        <div class="plus-sign">+</div>
        <div class="ball b-bonus" style="opacity:.3">?</div>
      </div>

      <div class="result-prize">
        1등 당첨금 <b id="latest-prize">동행복권 사이트 참조</b>
      </div>

      <div class="nav-links">
        <a href="https://www.dhlottery.co.kr/gameResult.do?method=byWin" target="_blank" class="nav-link">
          <span>당첨 결과 확인</span><span class="arrow">›</span>
        </a>
        <a href="https://www.dhlottery.co.kr/store.do?method=topStoreLocation&type=lotto" target="_blank" class="nav-link">
          <span>복권 판매점 찾기</span><span class="arrow">›</span>
        </a>
        <a href="https://www.dhlottery.co.kr/gameInfo.do?method=lotto645" target="_blank" class="nav-link">
          <span>로또 6/45 안내</span><span class="arrow">›</span>
        </a>
        <a href="https://dhlottery.co.kr/common.do?method=main" target="_blank" class="nav-link">
          <span>동행복권 홈페이지</span><span class="arrow">›</span>
        </a>
        <a href="https://www.dhlottery.co.kr/gameInfo.do?method=statView" target="_blank" class="nav-link">
          <span>번호 통계 분석</span><span class="arrow">›</span>
        </a>
      </div>
    </div>

  </div><!-- .main-wrap -->

</div><!-- .page-wrap -->

<script>
// ══════════════════════════════════════════════════════════════
// 배경 워터마크 숫자 생성
// ══════════════════════════════════════════════════════════════
(function(){
  const wrap = document.getElementById('bg-nums');
  const nums = [1,7,11,16,23,28,33,40,4,19,38,6,25,42,13,31,45,8,22,36,3,17,29,44,10];
  const positions = [
    [5,3],[15,18],[25,7],[35,22],[50,5],[65,15],[78,3],[88,20],
    [5,40],[18,55],[30,38],[45,48],[60,35],[72,50],[85,42],
    [8,70],[20,78],[35,65],[50,72],[65,62],[78,80],[90,68],
    [3,88],[25,90],[55,88]
  ];
  nums.forEach((n,i) => {
    const el = document.createElement('div');
    el.className = 'bg-num';
    el.textContent = n;
    const [l,t] = positions[i] || [Math.random()*90, Math.random()*90];
    el.style.left = l + '%';
    el.style.top  = t + '%';
    wrap.appendChild(el);
  });
})();

// ══════════════════════════════════════════════════════════════
// 번호 → 볼 CSS 클래스
// ══════════════════════════════════════════════════════════════
function ballClass(n, isBonus) {
  if (isBonus) return 'b-bonus';
  if (n <= 10)  return 'b1';
  if (n <= 20)  return 'b2';
  if (n <= 30)  return 'b3';
  if (n <= 40)  return 'b4';
  return 'b5';
}

function makeBall(n, isBonus, sizeClass) {
  const cls = ballClass(n, isBonus);
  const sz  = sizeClass || '';
  return `<div class="ball ${cls} ${sz}">${n}</div>`;
}

// ══════════════════════════════════════════════════════════════
// 카운트다운
// ══════════════════════════════════════════════════════════════
let _nextDrawTs = 0;

function startCountdown() {
  function tick() {
    if (!_nextDrawTs) return;
    const now  = Math.floor(Date.now() / 1000);
    const diff = _nextDrawTs - now;
    if (diff <= 0) {
      document.getElementById('cd-d').textContent = '00';
      document.getElementById('cd-h').textContent = '00';
      document.getElementById('cd-m').textContent = '00';
      document.getElementById('cd-s').textContent = '00';
      return;
    }
    const d = Math.floor(diff / 86400);
    const h = Math.floor((diff % 86400) / 3600);
    const m = Math.floor((diff % 3600) / 60);
    const s = diff % 60;
    document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
    document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);
}

// ══════════════════════════════════════════════════════════════
// /api/info 로드
// ══════════════════════════════════════════════════════════════
async function loadInfo() {
  try {
    const res  = await fetch('/api/info');
    const data = await res.json();
    if (data.status !== 'ok') return;

    // 다음 회차
    document.getElementById('next-draw-no').textContent = data.next_draw_no || '—';
    document.getElementById('next-draw-date').textContent = data.next_draw_date ? `(${data.next_draw_date})` : '';
    _nextDrawTs = data.next_draw_ts || 0;
    startCountdown();

    // 최근 추첨
    document.getElementById('latest-round').textContent = `제 ${data.latest_draw_no} 회`;
    document.getElementById('latest-date').textContent  = data.latest_date || '';

    const numbers = data.latest_numbers || [];
    const bonus   = data.latest_bonus;
    const ballsEl = document.getElementById('latest-balls');
    if (numbers.length === 6) {
      let html = numbers.map(n => makeBall(n, false)).join('');
      html += '<div class="plus-sign">+</div>';
      html += makeBall(bonus, true);
      ballsEl.innerHTML = html;
    }
  } catch(e) {
    console.warn('loadInfo 실패:', e);
  }
}

// ══════════════════════════════════════════════════════════════
// 바로 구매
// ══════════════════════════════════════════════════════════════
function buyLotto() {
  const buyUrl = 'https://www.dhlottery.co.kr/gameInfo.do?method=buyLotto&wisePick=Y';
  const ua = navigator.userAgent || '';
  const isAndroid = /android/i.test(ua);
  const isIOS     = /iphone|ipad|ipod/i.test(ua);

  if (isAndroid) {
    // Android: intent URI로 앱 실행 시도, 실패 시 웹 fallback
    const intentUrl = 'intent://open#Intent;scheme=dhlottery;package=kr.co.nhn.android.android.lotto645;S.browser_fallback_url=' + encodeURIComponent(buyUrl) + ';end';
    window.location.href = intentUrl;
    return;
  }

  if (isIOS) {
    // iOS: iframe trick으로 커스텀 스킴 시도
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = 'dhlottery://';
    document.body.appendChild(iframe);
    setTimeout(() => {
      document.body.removeChild(iframe);
      window.location.href = buyUrl;
    }, 800);
    return;
  }

  // 데스크탑
  window.open(buyUrl, '_blank');
}

// ══════════════════════════════════════════════════════════════
// 18시 제한
// ══════════════════════════════════════════════════════════════
function isResultAvailable() {
  return new Date().getHours() >= 18;
}

// ══════════════════════════════════════════════════════════════
// 예상 번호 버튼 클릭
// ══════════════════════════════════════════════════════════════
async function onPredictClick() {
  if (!isResultAvailable()) {
    const lock = document.getElementById('time-lock');
    lock.classList.add('show');
    setTimeout(() => lock.classList.remove('show'), 2500);
    return;
  }

  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('show');
  document.getElementById('loading-msg').textContent = 'AI 분석 중... 잠시만 기다려 주세요';
  document.getElementById('btn-predict').disabled = true;

  try {
    const config = {
      start_draw:            1,
      max_draw:              0,
      deadzone_window:       25,
      top_candidate_count:   20,
      output_limit:          5,
      recent_weight:         40,
      missing_weight:        20,
      square_weight:         0,
      deadzone_weight:       15,
      zone_weight:           15,
      mix_previous_ratio:    5,
      max_overlap:           3,
      max_popularity_risk:   3,
      backtest_rounds:       100,
      backtest_train_window: 150,
      sum_min:               100,
      sum_max:               170,
      min_ac:                7,
      odd_min:               2,
      odd_max:               4,
      high_min:              2,
      high_max:              4,
    };

    const res  = await fetch('/api/generate', {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify(config),
    });
    const json = await res.json();

    overlay.classList.remove('show');
    document.getElementById('btn-predict').disabled = false;

    if (json.status !== 'ok') {
      alert('분석 실패: ' + (json.message || '서버 오류'));
      return;
    }
    renderPopup(json);
  } catch(e) {
    overlay.classList.remove('show');
    document.getElementById('btn-predict').disabled = false;
    alert('요청 실패: ' + e.message);
  }
}

// ══════════════════════════════════════════════════════════════
// 결과 팝업 렌더링
// ══════════════════════════════════════════════════════════════
const RANK_EMOJI = ['🥇','🥈','🥉','4️⃣','5️⃣'];

function renderPopup(json) {
  const combos   = json.combinations || [];
  const warnings = json.warnings     || [];
  const data     = json.data         || {};

  // 회차 정보
  const drawInfo = data.latest_draw_no
    ? `제 ${data.latest_draw_no + 1}회 예상 번호 (${data.total_draws || 0}회차 분석)`
    : '';
  document.getElementById('popup-draw-info').textContent = drawInfo;

  // 조합 rows
  const combosEl = document.getElementById('popup-combos');
  combosEl.innerHTML = '';

  combos.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'combo-row';

    const rankEmoji = RANK_EMOJI[i] || `${i+1}.`;
    const balls = c.numbers.map(n => makeBall(n, false, 'ball-xs')).join('');

    row.innerHTML = `
      <div class="combo-rank">${rankEmoji}</div>
      <div class="combo-balls">${balls}</div>
      <div class="combo-meta">
        합계 <b>${c.total}</b> &nbsp;·&nbsp;
        홀수 <b>${c.odd_count}</b>개 &nbsp;·&nbsp;
        고번호 <b>${c.high_count}</b>개 &nbsp;·&nbsp;
        AC값 <b>${c.ac_value}</b> &nbsp;·&nbsp;
        점수 <b>${c.score.toFixed(1)}</b>
      </div>
    `;
    combosEl.appendChild(row);
  });

  // 경고
  const warnEl = document.getElementById('popup-warnings');
  warnEl.textContent = warnings.length ? '⚠ ' + warnings.join(' / ') : '';

  // 팝업 표시
  document.getElementById('result-popup').classList.add('show');
}

function closePopup(e) {
  if (e.target === document.getElementById('result-popup')) {
    document.getElementById('result-popup').classList.remove('show');
  }
}
function closePopupBtn() {
  document.getElementById('result-popup').classList.remove('show');
}

// ══════════════════════════════════════════════════════════════
// 초기 실행
// ══════════════════════════════════════════════════════════════
loadInfo();
</script>
</body>
</html>
